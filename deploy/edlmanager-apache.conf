# ============================================================================
# EDL Manager -- reverse proxy for https://panovision.example.com/edl
# ============================================================================
# This server already hosts other applications, so DO NOT add a new
# <VirtualHost>. Instead, paste the four directives below INSIDE the existing
# <VirtualHost *:443> block that serves panovision.example.com (alongside the
# other apps' ProxyPass lines), then reload Apache.
#
# Requires these modules (loaded by default on RHEL httpd):
#   mod_proxy, mod_proxy_http, mod_headers
# Verify with:  httpd -M | grep -E 'proxy_module|proxy_http_module|headers_module'
#
# The installer also enables the SELinux boolean that lets httpd open the
# loopback connection to the Node service:
#   setsebool -P httpd_can_network_connect 1
#
# After editing, always test before reloading:
#   apachectl configtest && systemctl reload httpd
# ----------------------------------------------------------------------------

ProxyPreserveHost On
RequestHeader set X-Forwarded-Proto "https"
ProxyPass        /edl  http://127.0.0.1:3010/edl  retry=0
ProxyPassReverse /edl  http://127.0.0.1:3010/edl

# Optional -- make /edl the LANDING page for this hostname by sending the bare
# root to it. Uncomment ONLY if no other app currently serves "/" on this vhost
# (it affects just the exact root path; other apps' sub-paths keep working):
# RedirectMatch 302 ^/$ /edl/

# Notes:
# - The Node app is base-path aware and serves itself under /edl, so the path is
#   passed through unchanged (no stripping). Firewall feed URLs look like:
#       https://panovision.example.com/edl/<slug>.txt
# - retry=0 avoids Apache blacklisting the worker for 60s if the backend is
#   briefly restarted.
# - The app binds 127.0.0.1 only; nothing new is exposed on the network.
# - If you change PORT in /etc/edlmanager/edlmanager.env, update 3010 here too.
