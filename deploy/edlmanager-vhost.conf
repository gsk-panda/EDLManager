# ============================================================================
# EDL Manager -- dedicated Apache vhost (reference)
# ============================================================================
# This makes https://example.com the "main site" landing on /edl.
# The installer GENERATES this file with your real PORT/cert paths when the
# hostname has no existing vhost. Use this copy only as a reference, or activate
# it manually after filling in the ${...} values:
#   apachectl configtest && systemctl reload httpd
#
# Do NOT use this if example.com already has a vhost (the other apps).
# In that case, merge edlmanager-apache.conf into the existing vhost instead.
# ----------------------------------------------------------------------------

<VirtualHost *:80>
    ServerName ${SERVER_NAME}
    RedirectMatch 301 ^/(.*)$ https://${SERVER_NAME}/$1
</VirtualHost>

<VirtualHost *:443>
    ServerName ${SERVER_NAME}

    SSLEngine on
    SSLCertificateFile    ${SSL_CERT}
    SSLCertificateKeyFile ${SSL_KEY}

    # Main site: send the bare root to the app at /edl.
    RedirectMatch 302 ^/$ /edl/

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    ProxyPass        /edl  http://127.0.0.1:${PORT}/edl  retry=0
    ProxyPassReverse /edl  http://127.0.0.1:${PORT}/edl

    ErrorLog  /var/log/httpd/edlmanager_error.log
    CustomLog /var/log/httpd/edlmanager_access.log combined
</VirtualHost>
